# Allwinner H618 quad core 2GB RAM SoC GBE USB3 SPI-LCD
# Based on longan-h618 p1 configuration
BOARD_NAME="Longan H618"
BOARD_VENDOR="longan"
BOARDFAMILY="sun50iw9"
BOARD_MAINTAINER=""
INTRODUCED="2024"
BOOT_FDT_FILE="allwinner/sun50i-h618-longan.dtb"
BOOTCONFIG="orangepi_zero2_defconfig"
BOOT_LOGO="desktop"
CRUSTCONFIG="pine_h64_defconfig"
KERNEL_TARGET="current,edge"
KERNEL_TEST_TARGET="current"
MODULES="fbtft fb_st7789v fbtft_device pcf8563"
MODULES_BLACKLIST="sprdwl_ng"
HAS_VIDEO_OUTPUT="yes"
SERIALCON="ttyS0:115200"
PACKAGE_LIST_BOARD="rfkill bluetooth bluez bluez-tools i2c-tools"
DEFAULT_OVERLAYS="usbhost0 usbhost2 usbhost3"

function post_family_config__use_longan_h618_uboot() {
	case $BRANCH in
		* )
			declare -g ATFBRANCH="tag:lts-v2.12.9"
			declare -g BOOTPATCHDIR="v2026.01"
			declare -g BOOTBRANCH_BOARD="tag:${BOOTPATCHDIR}"
			declare -g BOOTBRANCH="${BOOTBRANCH_BOARD}"

			write_uboot_platform() {
				dd if=$1/u-boot-sunxi-with-spl.bin of=$2 conv=fsync bs=1024 seek=8
			}
			;;
	esac
}

function post_family_tweaks_bsp__longan_h618_bsp() {
	display_alert "$BOARD" "Installing Longan H618 BSP tweaks" "info"

	# ST7789V framebuffer configuration
	mkdir -p "${destination}"/etc/modules-load.d
	cat > "${destination}"/etc/modules-load.d/longan-h618.conf <<- EOT
	spi-dev
	fbtft
	fb_st7789v
	fbtft_device
	EOT

	# ST7789V fbtft device configuration
	mkdir -p "${destination}"/etc/modprobe.d
	cat > "${destination}"/etc/modprobe.d/fbtft-longan.conf <<- EOT
	options fbtft_device name=fb_st7789v gpios=reset:136,dc:132,led:137 speed=10000000 rotate=90 bgr=1 width=170 height=320
	EOT

	# WiFi/BT support for UWE5622
	if [[ -f "$SRC/packages/bsp/sunxi/sprd-bluetooth" ]] && \
	[[ -f "$SRC/packages/bsp/sunxi/aw859a-wifi.service" ]] && \
	[[ -f "$SRC/packages/blobs/bt/hciattach/hciattach_opi_${ARCH}_upstream" ]]; then
		mkdir -p "${destination}"/usr/bin
		mkdir -p "${destination}"/etc/systemd/system
		cp -f "$SRC/packages/bsp/sunxi/sprd-bluetooth" "${destination}"/usr/bin
		cp -f "$SRC/packages/blobs/bt/hciattach/hciattach_opi_${ARCH}_upstream" "${destination}"/usr/bin/hciattach_opi
		chmod +x "${destination}"/usr/bin/sprd-bluetooth
		chmod +x "${destination}"/usr/bin/hciattach_opi
		cat > "${destination}"/etc/systemd/system/sprd-bluetooth.service <<- EOT
		[Unit]
		Description=SPRD Bluetooth
		After=bluetooth.service bluetooth.target

		[Service]
		Type=simple
		ExecStartPre=/usr/sbin/rfkill unblock all
		ExecStart=/usr/bin/sprd-bluetooth
		TimeoutSec=0
		RemainAfterExit=true

		[Install]
		WantedBy=multi-user.target
		EOT
	fi
}

function post_family_tweaks__longan_h618_tweaks() {
	display_alert "$BOARD" "Applying Longan H618 tweaks" "info"

	# Enable Bluetooth service
	if [[ -f "${SDCARD}/etc/systemd/system/sprd-bluetooth.service" ]]; then
		chroot_sdcard systemctl --no-reload enable sprd-bluetooth.service
	fi

	# Enable I2C1 for PCF8563 RTC
	mkdir -p "${SDCARD}"/etc/modules-load.d
	echo "i2c-dev" >> "${SDCARD}"/etc/modules-load.d/longan-h618.conf
}

function post_family_config__longan_h618_set_asoundstate() {
	declare -g ASOUND_STATE='asound.state.sunxi-next'
}

function post_family_tweaks__longan_h618_audio() {
	if [[ $BUILD_DESKTOP == yes ]]; then
		sed -i "s/auto-profiles = yes/auto-profiles = no/" ${SDCARD}/usr/share/pulseaudio/alsa-mixer/profile-sets/default.conf
		echo "load-module module-alsa-sink device=hw:0,0 sink_name=AudioCodec-Playback sink_properties=\"device.description='Audio Codec'\"" >> ${SDCARD}/etc/pulse/default.pa
		echo "load-module module-alsa-sink device=hw:1,0 sink_name=HDMI-Playback sink_properties=\"device.description='HDMI Audio'\"" >> ${SDCARD}/etc/pulse/default.pa
	fi
}
