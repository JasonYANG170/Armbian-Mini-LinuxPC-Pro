name: Build Armbian for DSDZ-H618

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        default: 'minimal'
        type: choice
        options:
          - minimal
          - desktop
      desktop_env:
        description: 'Desktop environment (only for desktop build)'
        required: false
        default: 'gnome'
        type: choice
        options:
          - gnome
          - xfce
          - kde-plasma
          - mate
          - cinnamon

env:
  BUILD_TYPE: ${{ github.event.inputs.build_type || 'minimal' }}
  DESKTOP_ENV: ${{ github.event.inputs.desktop_env || 'gnome' }}

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc 2>/dev/null
        sudo apt-get clean
        df -h

    - name: Setup build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential git wget ca-certificates gnupg \
          bc bison flex libssl-dev u-boot-tools \
          python3 python3-dev python3-pip python3-setuptools \
          cpio lz4 xz-utils zstd \
          device-tree-compiler ncurses-dev \
          kmod rsync libarchive-dev \
          qemu-user-static binfmt-support \
          debootstrap debian-archive-keyring \
          ubuntu-keyring

    - name: Build minimal image
      if: env.BUILD_TYPE == 'minimal'
      run: |
        chmod +x compile.sh
        ./compile.sh build BOARD=dsdz-h618 BRANCH=current \
          BUILD_DESKTOP=no \
          BUILD_MINIMAL=yes \
          KERNEL_CONFIGURE=no \
          RELEASE=jammy

    - name: Build desktop image
      if: env.BUILD_TYPE == 'desktop'
      run: |
        chmod +x compile.sh
        ./compile.sh build BOARD=dsdz-h618 BRANCH=current \
          BUILD_DESKTOP=yes \
          BUILD_MINIMAL=no \
          DESKTOP_APPGROUPS_SELECTED='browsers multimedia' \
          DESKTOP_ENVIRONMENT=${{ env.DESKTOP_ENV }} \
          DESKTOP_ENVIRONMENT_CONFIG_NAME=config_base \
          KERNEL_CONFIGURE=no \
          RELEASE=jammy

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: Armbian-DSDZ-H618-${{ env.BUILD_TYPE }}-${{ github.run_number }}
        path: output/images/*.img.xz
        retention-days: 30

    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          output/logs/*.log
          output/logs/*.txt
        retention-days: 7
