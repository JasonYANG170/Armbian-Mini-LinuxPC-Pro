name: Build Armbian for DSDZ-H618

on:
  workflow_dispatch:
    inputs:
      armbian_release:
        description: 'Armbian Release'
        required: false
        default: 'jammy'
        type: choice
        options:
          - jammy
          - noble
          - bookworm

env:
  RELEASE: ${{ github.event.inputs.armbian_release || 'jammy' }}

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
        sudo apt-get clean
        df -h

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y wget xz-utils device-tree-compiler

    - name: Download official Armbian image
      run: |
        # 获取最新 Armbian H618 镜像 URL
        # 使用 OrangePi Zero3 的镜像（同为 H618）
        echo "Downloading Armbian for H618..."
        
        # 从 GitHub API 获取最新 release
        API_URL="https://api.github.com/repos/armbian/build/releases/latest"
        DOWNLOAD_URL=$(curl -s "$API_URL" | python3 -c "
        import json, sys
        data = json.load(sys.stdin)
        for asset in data.get('assets', []):
            name = asset['name']
            if 'orangepi3' in name.lower() or 'zero3' in name.lower():
                if name.endswith('.img.xz'):
                    print(asset['browser_download_url'])
                    break
        ")
        
        if [ -z "$DOWNLOAD_URL" ]; then
          echo "Trying alternative: download from Armbian CDN..."
          DOWNLOAD_URL="https://mirrors.tuna.tsinghua.edu.cn/armbian-dl/orangepi3/archive/Armbian_24.2.1_Orangepi3_jammy_current_6.6.16.img.xz"
        fi
        
        echo "Downloading from: $DOWNLOAD_URL"
        wget -q "$DOWNLOAD_URL" -O armbian-base.img.xz || {
          echo "Direct download failed, trying Armbian download page..."
          # 备用：从文件列表下载
          wget -q "https://github.com/armbian/build/releases/download/v24.2.1/Armbian_24.2.1_Orangepi3_jammy_current_6.6.16.img.xz" -O armbian-base.img.xz
        }
        
        echo "Decompressing..."
        xz -d armbian-base.img.xz
        ls -lh armbian-base.img

    - name: Mount and modify image
      run: |
        # 创建挂载点
        mkdir -p /tmp/armbian/{boot,root}
        
        # 获取 loop 设备
        LOOP=$(sudo losetup -fP --show armbian-base.img)
        echo "Loop device: $LOOP"
        
        # 挂载分区
        sudo mount ${LOOP}p1 /tmp/armbian/boot
        sudo mount ${LOOP}p2 /tmp/armbian/root
        
        # 复制设备树
        echo "Adding DSDZ-H618 device tree..."
        sudo cp build-armbian/armbian-files/platform-files/allwinner/bootfs/dtb/allwinner/sun50i-h618-dsdz-h618.dtb /tmp/armbian/boot/dtb/allwinner/
        
        # 修改 armbianEnv.txt
        sudo tee /tmp/armbian/boot/armbianEnv.txt << 'EOF'
        verbosity=1
        bootlogo=false
        overlay_prefix=sun50i-h616
        fdtfile=allwinner/sun50i-h618-dsdz-h618.dtb
        rootdev=UUID=ROOT_UUID
        rootfstype=ext4
        rootflags=commit=5,noatime
        EOF
        
        # 获取 rootfs UUID
        ROOT_UUID=$(sudo blkid -s UUID -o value ${LOOP}p2)
        sudo sed -i "s/ROOT_UUID/$ROOT_UUID/" /tmp/armbian/boot/armbianEnv.txt
        
        # 添加首次运行脚本
        sudo cp build-armbian/armbian-files/platform-files/allwinner/rootfs/* /tmp/armbian/root/root/ 2>/dev/null || true
        
        # 卸载
        sudo umount /tmp/armbian/boot
        sudo umount /tmp/armbian/root
        sudo losetup -d $LOOP
        
        echo "Image modified successfully"

    - name: Compress and publish
      run: |
        # 压缩镜像
        xz -z armbian-base.img
        
        # 重命名
        DATE=$(date +%Y%m%d)
        mv armbian-base.img.xz "Armbian-DSDZ-H618-${RELEASE}-${DATE}.img.xz"
        
        ls -lh *.img.xz

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: Armbian-DSDZ-H618-${{ env.RELEASE }}
        path: "*.img.xz"
        retention-days: 30

    - name: Create release
      if: github.event_name != 'pull_request'
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: armbian-${{ env.RELEASE }}-${{ github.run_number }}
        name: "Armbian DSDZ-H618 ${{ env.RELEASE }}"
        files: "*.img.xz"
        generate_release_notes: true
