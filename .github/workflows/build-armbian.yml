name: Build Armbian for DSDZ-H618

on:
  push:
    branches: [ main ]
    paths:
      - 'myfile/**'
      - '.github/workflows/build-armbian.yml'
  workflow_dispatch:
    inputs:
      armbian_release:
        description: 'Armbian Release'
        required: false
        default: 'noble'
        type: choice
        options:
          - noble
          - bookworm

env:
  RELEASE: ${{ github.event.inputs.armbian_release || 'noble' }}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
        sudo apt-get clean
        df -h

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y wget xz-utils device-tree-compiler gcc

    - name: Compile DSDZ-H618 DTB
      run: |
        set -e
        mkdir -p /tmp/dtb-build/include

        # 下载内核 v6.12 的 dt-bindings 头文件
        KERNEL_GIT="https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git/plain/include"
        KERNEL_TAG="v6.12.23"
        mkdir -p /tmp/dtb-build/include/dt-bindings/{clock,reset,thermal,interrupt-controller,gpio,leds,pinctrl}
        for f in \
          "dt-bindings/gpio/gpio.h" \
          "dt-bindings/interrupt-controller/arm-gic.h" \
          "dt-bindings/leds/common.h" \
          "dt-bindings/thermal/thermal.h" \
          "dt-bindings/clock/sun50i-h616-ccu.h" \
          "dt-bindings/clock/sun50i-h6-r-ccu.h" \
          "dt-bindings/clock/sun6i-rtc.h" \
          "dt-bindings/clock/sun8i-de2.h" \
          "dt-bindings/clock/sun8i-tcon-top.h" \
          "dt-bindings/reset/sun50i-h616-ccu.h" \
          "dt-bindings/reset/sun50i-h6-r-ccu.h" \
          "dt-bindings/reset/sun8i-de2.h" \
          "dt-bindings/pinctrl/sun50i-h616.h" \
        ; do
          echo "Downloading $f ..."
          wget -q "${KERNEL_GIT}/${f}?h=${KERNEL_TAG}" -O "/tmp/dtb-build/include/${f}" || \
            echo "WARNING: Failed to download $f"
        done

        # 复制 dtsi 文件到 include 目录
        cp myfile/sun50i-h616.dtsi /tmp/dtb-build/include/
        cp myfile/sun50i-h616-cpu-opp.dtsi /tmp/dtb-build/include/

        # 用 cpp 预处理 DTS（解析所有 #include 和宏）
        cpp -nostdinc -I/tmp/dtb-build/include -undef -x assembler-with-cpp \
          myfile/sun50i-h618-dsdz-h618.dts \
          /tmp/dtb-build/sun50i-h618-dsdz-h618.preprocessed.dts

        # 清理 cpp 产生的行标记
        sed -i '/^# [0-9]/d' /tmp/dtb-build/sun50i-h618-dsdz-h618.preprocessed.dts

        echo "Preprocessed DTS lines: $(wc -l < /tmp/dtb-build/sun50i-h618-dsdz-h618.preprocessed.dts)"

        # 编译 DTB
        dtc -I dts -O dtb -o /tmp/dtb-build/sun50i-h618-dsdz-h618.dtb \
          /tmp/dtb-build/sun50i-h618-dsdz-h618.preprocessed.dts

        ls -lh /tmp/dtb-build/sun50i-h618-dsdz-h618.dtb
        echo "DTB compiled successfully!"

        # 复制到 repo 目录供后续使用
        mkdir -p build-armbian/armbian-files/platform-files/allwinner/bootfs/dtb/allwinner
        cp /tmp/dtb-build/sun50i-h618-dsdz-h618.dtb \
           build-armbian/armbian-files/platform-files/allwinner/bootfs/dtb/allwinner/

    - name: Download official Armbian image
      run: |
        echo "Downloading Armbian for OrangePi Zero3 (H618)..."
        RELEASE="${{ env.RELEASE }}"
        MIRROR_BASE="https://mirrors.tuna.tsinghua.edu.cn/armbian-releases/orangepizero3/archive"
        FILE_LIST=$(curl -sL "$MIRROR_BASE/" | grep -oP 'href="(Armbian_[^"]*\.img\.xz)"' | sed 's/href="//;s/"//')
        DOWNLOAD_FILE=$(echo "$FILE_LIST" | grep -i "_${RELEASE}_" | grep -i "minimal" | head -1)
        if [ -z "$DOWNLOAD_FILE" ]; then
          DOWNLOAD_FILE=$(echo "$FILE_LIST" | grep -i "_${RELEASE}_" | head -1)
        fi
        if [ -z "$DOWNLOAD_FILE" ]; then
          echo "ERROR: No image found for release '${RELEASE}'"
          echo "Available:"
          echo "$FILE_LIST"
          exit 1
        fi
        DOWNLOAD_URL="${MIRROR_BASE}/${DOWNLOAD_FILE}"
        echo "Downloading: $DOWNLOAD_URL"
        wget -q --show-progress "$DOWNLOAD_URL" -O armbian-base.img.xz
        echo "Decompressing..."
        xz -d armbian-base.img.xz
        ls -lh armbian-base.img

    - name: Mount and modify image
      run: |
        set -e
        mkdir -p /tmp/armbian/root

        # 单分区镜像：直接挂载第一个分区
        LOOP=$(sudo losetup -f --show -o 4194304 armbian-base.img)
        echo "Loop device: $LOOP"
        sudo mount $LOOP /tmp/armbian/root

        echo "=== Original armbianEnv.txt ==="
        cat /tmp/armbian/root/boot/armbianEnv.txt
        sudo cp /tmp/armbian/root/boot/armbianEnv.txt /tmp/armbian/root/boot/armbianEnv.txt.orig

        ROOT_UUID=$(sudo blkid -s UUID -o value $LOOP)
        echo "Root UUID: $ROOT_UUID"

        printf 'verbosity=1\nbootlogo=false\noverlay_prefix=sun50i-h616\nfdtfile=allwinner/sun50i-h618-dsdz-h618.dtb\nrootdev=UUID=%s\nrootfstype=ext4\nrootflags=commit=5,noatime\n' "$ROOT_UUID" | sudo tee /tmp/armbian/root/boot/armbianEnv.txt > /dev/null

        echo "=== New armbianEnv.txt ==="
        cat /tmp/armbian/root/boot/armbianEnv.txt

        # 使用编译好的 DSDZ-H618 DTB（含 ST7789V 显示支持）
        DTB_SRC="build-armbian/armbian-files/platform-files/allwinner/bootfs/dtb/allwinner/sun50i-h618-dsdz-h618.dtb"
        if [ -f "$DTB_SRC" ]; then
          echo "Installing DSDZ-H618 DTB with ST7789V display support..."
          sudo cp "$DTB_SRC" /tmp/armbian/root/boot/dtb/allwinner/
        else
          echo "ERROR: DTB not found at $DTB_SRC"
          exit 1
        fi

        # Rootfs overlay (WiFi firmware, first-login script, EMMC tool)
        OVERLAY_DIR="myfile/overlay_rootfs"
        if [ -d "$OVERLAY_DIR" ]; then
          echo "Applying rootfs overlay from $OVERLAY_DIR ..."
          sudo cp -rT "$OVERLAY_DIR" /tmp/armbian/root/
          echo "Overlay applied"
        else
          echo "WARNING: No overlay directory at $OVERLAY_DIR"
        fi

        # Sync and unmount
        sync
        sudo umount /tmp/armbian/root
        sudo losetup -d $LOOP

        echo "Image modified successfully"

    - name: Compress and publish
      run: |
        xz -z -T0 armbian-base.img
        DATE=$(date +%Y%m%d)
        mv armbian-base.img.xz "Armbian-DSDZ-H618-${RELEASE}-${DATE}.img.xz"
        ls -lh *.img.xz

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: Armbian-DSDZ-H618-${{ env.RELEASE }}
        path: "Armbian-DSDZ-H618-*.img.xz"
        retention-days: 30

    - name: Create release
      if: github.event_name != 'pull_request'
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: armbian-${{ env.RELEASE }}-${{ github.run_number }}
        name: "Armbian DSDZ-H618 ${{ env.RELEASE }}"
        files: "Armbian-DSDZ-H618-*.img.xz"
        generate_release_notes: true
