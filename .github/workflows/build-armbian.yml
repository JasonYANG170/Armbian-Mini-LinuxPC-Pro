name: Build Armbian for DSDZ-H618

on:
  push:
    branches: [ main ]
    paths:
      - 'myfile/**'
      - '.github/workflows/build-armbian.yml'
  workflow_dispatch:
    inputs:
      armbian_release:
        description: 'Armbian Release'
        required: false
        default: 'noble'
        type: choice
        options:
          - noble
          - bookworm

env:
  RELEASE: ${{ github.event.inputs.armbian_release || 'noble' }}

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
        sudo apt-get clean
        df -h

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y wget xz-utils kpartx

    - name: Download official Armbian image
      run: |
        echo "Downloading Armbian for OrangePi Zero3 (H618)..."
        RELEASE="${{ env.RELEASE }}"
        MIRROR_BASE="https://mirrors.tuna.tsinghua.edu.cn/armbian-releases/orangepizero3/archive"
        FILE_LIST=$(curl -sL "$MIRROR_BASE/" | grep -oP 'href="(Armbian_[^"]*\.img\.xz)"' | sed 's/href="//;s/"//')
        DOWNLOAD_FILE=$(echo "$FILE_LIST" | grep -i "_${RELEASE}_" | grep -i "minimal" | head -1)
        if [ -z "$DOWNLOAD_FILE" ]; then
          DOWNLOAD_FILE=$(echo "$FILE_LIST" | grep -i "_${RELEASE}_" | head -1)
        fi
        if [ -z "$DOWNLOAD_FILE" ]; then
          echo "ERROR: No image found for release '${RELEASE}'"
          echo "Available:"
          echo "$FILE_LIST"
          exit 1
        fi
        DOWNLOAD_URL="${MIRROR_BASE}/${DOWNLOAD_FILE}"
        echo "Downloading: $DOWNLOAD_URL"
        wget -q --show-progress "$DOWNLOAD_URL" -O armbian-base.img.xz
        echo "Decompressing..."
        xz -d armbian-base.img.xz
        ls -lh armbian-base.img

    - name: Mount and modify image
      run: |
        set -e
        mkdir -p /tmp/armbian/boot /tmp/armbian/root

        # 使用 kpartx 映射分区
        KPARTX_OUT=$(sudo kpartx -av armbian-base.img)
        echo "$KPARTX_OUT"
        # 获取 loop 设备名
        LOOP_DEV=$(echo "$KPARTX_OUT" | grep -oP 'loop\d+' | head -1)
        echo "Loop device: $LOOP_DEV"

        # 等待设备节点就绪
        sleep 2

        # 挂载分区（Armbian: p1=boot, p2=rootfs）
        sudo mount /dev/mapper/${LOOP_DEV}p1 /tmp/armbian/boot
        sudo mount /dev/mapper/${LOOP_DEV}p2 /tmp/armbian/root

        echo "=== Original armbianEnv.txt ==="
        cat /tmp/armbian/boot/armbianEnv.txt
        sudo cp /tmp/armbian/boot/armbianEnv.txt /tmp/armbian/boot/armbianEnv.txt.orig

        ROOT_UUID=$(sudo blkid -s UUID -o value /dev/mapper/${LOOP_DEV}p2)
        echo "Root UUID: $ROOT_UUID"

        printf 'verbosity=1\nbootlogo=false\noverlay_prefix=sun50i-h616\nfdtfile=allwinner/sun50i-h618-dsdz-h618.dtb\nrootdev=UUID=%s\nrootfstype=ext4\nrootflags=commit=5,noatime\n' "$ROOT_UUID" | sudo tee /tmp/armbian/boot/armbianEnv.txt > /dev/null

        echo "=== New armbianEnv.txt ==="
        cat /tmp/armbian/boot/armbianEnv.txt

        # DTB: 如有预编译DTB则使用，否则复制 OrangePi Zero3 DTB
        DTB_SRC="build-armbian/armbian-files/platform-files/allwinner/bootfs/dtb/allwinner/sun50i-h618-dsdz-h618.dtb"
        if [ -f "$DTB_SRC" ]; then
          echo "Adding custom DSDZ-H618 DTB..."
          sudo cp "$DTB_SRC" /tmp/armbian/boot/dtb/allwinner/
        else
          echo "No custom DTB, copying OrangePi Zero3 DTB as DSDZ-H618"
          sudo cp /tmp/armbian/boot/dtb/allwinner/sun50i-h618-orangepi-zero3.dtb \
                   /tmp/armbian/boot/dtb/allwinner/sun50i-h618-dsdz-h618.dtb
        fi

        # 应用 rootfs overlay
        OVERLAY_DIR="myfile/overlay_rootfs"
        if [ -d "$OVERLAY_DIR" ]; then
          echo "Applying rootfs overlay from $OVERLAY_DIR ..."
          sudo cp -rT "$OVERLAY_DIR" /tmp/armbian/root/
          echo "Overlay applied"
        else
          echo "WARNING: No overlay directory at $OVERLAY_DIR"
        fi

        # 卸载
        sudo umount /tmp/armbian/boot
        sudo umount /tmp/armbian/root
        sudo kpartx -d armbian-base.img

        echo "Image modified successfully"

    - name: Compress and publish
      run: |
        xz -z -T0 armbian-base.img
        DATE=$(date +%Y%m%d)
        mv armbian-base.img.xz "Armbian-DSDZ-H618-${RELEASE}-${DATE}.img.xz"
        ls -lh *.img.xz

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: Armbian-DSDZ-H618-${{ env.RELEASE }}
        path: "Armbian-DSDZ-H618-*.img.xz"
        retention-days: 30

    - name: Create release
      if: github.event_name != 'pull_request'
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: armbian-${{ env.RELEASE }}-${{ github.run_number }}
        name: "Armbian DSDZ-H618 ${{ env.RELEASE }}"
        files: "Armbian-DSDZ-H618-*.img.xz"
        generate_release_notes: true
